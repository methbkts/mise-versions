# cache-break: 2025-12-15
tasks.build = "aube exec tsc"
tasks.dev = "aube exec wrangler dev"
tasks.lint = "aube exec eslint . --ext .ts && aube exec prettier --check ."
tasks."lint:fix" = "aube exec eslint . --ext .ts --fix && aube exec prettier --write ."

tasks.gen.run = [
  "aube dlx supabase gen types typescript --project-id fjrwmlxwmhtzflckukna > ./src/database.types.ts",
  "aube exec prettier --write ./src/database.types.ts"
]

[tasks.deploy]
depends = ["build"]
run = "aube exec wrangler deploy"

[tools]
"aqua:chmln/sd" = "latest"
aube = "latest"
fd = "latest"
"github:peak/s5cmd" = "latest"
hk = "latest"
node = "24"
pkl = "latest"
shellcheck = "latest"
shfmt = "latest"
uv = "latest"
wait-for-gh-rate-limit = "latest"
yq = "latest"

[env]
_.path = ["./node_modules/.bin"]
