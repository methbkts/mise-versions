name: deploy
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/*.toml"
      - "web/**"
      - "src/**"
      - "wrangler.jsonc"
      - "package.json"
      - "aube-lock.yaml"
      - ".config/aube/config.toml"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: aube ci

      - name: Build web frontend
        run: aube --dir web run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run database migrations
        run: node scripts/migrate.js run
        env:
          TOKEN_MANAGER_URL: https://mise-tools.jdx.dev
          TOKEN_MANAGER_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
