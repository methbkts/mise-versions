name: metadata
on:
  workflow_dispatch:
  schedule:
    # Run every Sunday at 3:47 AM UTC
    - cron: "47 3 * * 0"

concurrency:
  group: metadata
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  TOKEN_MANAGER_URL: https://mise-tools.jdx.dev
  TOKEN_MANAGER_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}

jobs:
  fetch-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4

      - run: aube ci

      - name: Fetch and sync tool metadata
        run: node scripts/fetch-metadata.js
        env:
          SYNC_API_URL: https://mise-tools.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
