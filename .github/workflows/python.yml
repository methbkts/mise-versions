name: python-precompiled
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

concurrency:
  group: python-precompiled
  cancel-in-progress: true

permissions:
  contents: write

env:
  GITHUB_API_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  DRY_RUN: 0
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - run: aube ci
      - run: ./scripts/python.sh
      - name: Upload .gz files to R2
        run: ./scripts/upload-gz.sh
        env:
          API_URL: https://mise-versions.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
